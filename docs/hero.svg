<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" font-family="'Segoe UI', monospace">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d1a"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="gnnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4aff"/>
      <stop offset="100%" style="stop-color:#8a2be2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6699ff"/>
    </marker>
    <marker id="arrowWhite" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#aaaacc"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" fill="url(#bg)" rx="12"/>

  <!-- ═══════════════════════════════════════════════
       LEFT PANEL: Board as Graph (KQvK position)
       Board origin: x=30, y=40, cell=30px → 240x240
  ════════════════════════════════════════════════ -->

  <!-- Board squares -->
  <g opacity="0.85">
    <!-- Row 8 (y=40) to Row 1 (y=250), cols a(x=30) to h(x=240) -->
    <!-- Light squares -->
    <rect x="30"  y="40"  width="30" height="30" fill="#2a2a4a"/>
    <rect x="90"  y="40"  width="30" height="30" fill="#2a2a4a"/>
    <rect x="150" y="40"  width="30" height="30" fill="#2a2a4a"/>
    <rect x="210" y="40"  width="30" height="30" fill="#2a2a4a"/>
    <rect x="60"  y="70"  width="30" height="30" fill="#2a2a4a"/>
    <rect x="120" y="70"  width="30" height="30" fill="#2a2a4a"/>
    <rect x="180" y="70"  width="30" height="30" fill="#2a2a4a"/>
    <rect x="240" y="70"  width="30" height="30" fill="#2a2a4a"/>
    <rect x="30"  y="100" width="30" height="30" fill="#2a2a4a"/>
    <rect x="90"  y="100" width="30" height="30" fill="#2a2a4a"/>
    <rect x="150" y="100" width="30" height="30" fill="#2a2a4a"/>
    <rect x="210" y="100" width="30" height="30" fill="#2a2a4a"/>
    <rect x="60"  y="130" width="30" height="30" fill="#2a2a4a"/>
    <rect x="120" y="130" width="30" height="30" fill="#2a2a4a"/>
    <rect x="180" y="130" width="30" height="30" fill="#2a2a4a"/>
    <rect x="240" y="130" width="30" height="30" fill="#2a2a4a"/>
    <rect x="30"  y="160" width="30" height="30" fill="#2a2a4a"/>
    <rect x="90"  y="160" width="30" height="30" fill="#2a2a4a"/>
    <rect x="150" y="160" width="30" height="30" fill="#2a2a4a"/>
    <rect x="210" y="160" width="30" height="30" fill="#2a2a4a"/>
    <rect x="60"  y="190" width="30" height="30" fill="#2a2a4a"/>
    <rect x="120" y="190" width="30" height="30" fill="#2a2a4a"/>
    <rect x="180" y="190" width="30" height="30" fill="#2a2a4a"/>
    <rect x="240" y="190" width="30" height="30" fill="#2a2a4a"/>
    <rect x="30"  y="220" width="30" height="30" fill="#2a2a4a"/>
    <rect x="90"  y="220" width="30" height="30" fill="#2a2a4a"/>
    <rect x="150" y="220" width="30" height="30" fill="#2a2a4a"/>
    <rect x="210" y="220" width="30" height="30" fill="#2a2a4a"/>
    <rect x="60"  y="250" width="30" height="30" fill="#2a2a4a"/>
    <rect x="120" y="250" width="30" height="30" fill="#2a2a4a"/>
    <rect x="180" y="250" width="30" height="30" fill="#2a2a4a"/>
    <rect x="240" y="250" width="30" height="30" fill="#2a2a4a"/>
    <!-- Dark squares -->
    <rect x="60"  y="40"  width="30" height="30" fill="#1a1a30"/>
    <rect x="120" y="40"  width="30" height="30" fill="#1a1a30"/>
    <rect x="180" y="40"  width="30" height="30" fill="#1a1a30"/>
    <rect x="240" y="40"  width="30" height="30" fill="#1a1a30"/>
    <rect x="30"  y="70"  width="30" height="30" fill="#1a1a30"/>
    <rect x="90"  y="70"  width="30" height="30" fill="#1a1a30"/>
    <rect x="150" y="70"  width="30" height="30" fill="#1a1a30"/>
    <rect x="210" y="70"  width="30" height="30" fill="#1a1a30"/>
    <rect x="60"  y="100" width="30" height="30" fill="#1a1a30"/>
    <rect x="120" y="100" width="30" height="30" fill="#1a1a30"/>
    <rect x="180" y="100" width="30" height="30" fill="#1a1a30"/>
    <rect x="240" y="100" width="30" height="30" fill="#1a1a30"/>
    <rect x="30"  y="130" width="30" height="30" fill="#1a1a30"/>
    <rect x="90"  y="130" width="30" height="30" fill="#1a1a30"/>
    <rect x="150" y="130" width="30" height="30" fill="#1a1a30"/>
    <rect x="210" y="130" width="30" height="30" fill="#1a1a30"/>
    <rect x="60"  y="160" width="30" height="30" fill="#1a1a30"/>
    <rect x="120" y="160" width="30" height="30" fill="#1a1a30"/>
    <rect x="180" y="160" width="30" height="30" fill="#1a1a30"/>
    <rect x="240" y="160" width="30" height="30" fill="#1a1a30"/>
    <rect x="30"  y="190" width="30" height="30" fill="#1a1a30"/>
    <rect x="90"  y="190" width="30" height="30" fill="#1a1a30"/>
    <rect x="150" y="190" width="30" height="30" fill="#1a1a30"/>
    <rect x="210" y="190" width="30" height="30" fill="#1a1a30"/>
    <rect x="60"  y="220" width="30" height="30" fill="#1a1a30"/>
    <rect x="120" y="220" width="30" height="30" fill="#1a1a30"/>
    <rect x="180" y="220" width="30" height="30" fill="#1a1a30"/>
    <rect x="240" y="220" width="30" height="30" fill="#1a1a30"/>
    <rect x="30"  y="250" width="30" height="30" fill="#1a1a30"/>
    <rect x="90"  y="250" width="30" height="30" fill="#1a1a30"/>
    <rect x="150" y="250" width="30" height="30" fill="#1a1a30"/>
    <rect x="210" y="250" width="30" height="30" fill="#1a1a30"/>
  </g>

  <!-- Board border -->
  <rect x="30" y="40" width="240" height="240" fill="none" stroke="#4a4a8a" stroke-width="1.5" rx="1"/>

  <!-- Rank labels -->
  <g fill="#555577" font-size="9" text-anchor="middle">
    <text x="22" y="59">8</text><text x="22" y="89">7</text>
    <text x="22" y="119">6</text><text x="22" y="149">5</text>
    <text x="22" y="179">4</text><text x="22" y="209">3</text>
    <text x="22" y="239">2</text><text x="22" y="269">1</text>
  </g>
  <g fill="#555577" font-size="9" text-anchor="middle">
    <text x="45" y="295">a</text><text x="75" y="295">b</text>
    <text x="105" y="295">c</text><text x="135" y="295">d</text>
    <text x="165" y="295">e</text><text x="195" y="295">f</text>
    <text x="225" y="295">g</text><text x="255" y="295">h</text>
  </g>

  <!-- ── Graph edges (relational types) ──
       KQvK position: wK=e1(col4,row7→x=150+15=165, y=250+15=265→center 165,265)
                      wQ=d5(col3,row3→x=120+15=135, y=130+15=145→center 135,145)
                      bK=e8(col4,row0→x=150+15=165, y=40+15=55→center 165,55)
       Cell centers: col=(file*30+30+15), row=(rank_from_top*30+40+15)
       e1 = file4, rank0from bottom = rank7from top → x=150+15=165, y=250+15=265 → (165,265)
       d5 = file3, rank4from bottom = rank3from top → x=120+15=135, y=130+15=145 → (135,145)
       e8 = file4, rank7from bottom = rank0from top → x=150+15=165, y=40+15=55  → (165,55)
  -->

  <!-- Attack edge: wQ attacks bK (red) -->
  <line x1="135" y1="145" x2="165" y2="58" stroke="#ff4466" stroke-width="1.8" stroke-dasharray="5,3" opacity="0.9" filter="url(#glow)"/>
  <!-- Defense edge: wQ defends wK area (green) -->
  <line x1="135" y1="145" x2="165" y2="262" stroke="#44ff88" stroke-width="1.8" stroke-dasharray="5,3" opacity="0.8" filter="url(#glow)"/>
  <!-- X-Ray edge: wK–wQ–bK alignment (yellow) -->
  <line x1="165" y1="265" x2="165" y2="58" stroke="#ffcc00" stroke-width="1.2" stroke-dasharray="3,5" opacity="0.5"/>
  <!-- King proximity edge (blue) -->
  <line x1="165" y1="265" x2="135" y2="145" stroke="#6699ff" stroke-width="1.2" stroke-dasharray="4,4" opacity="0.6"/>

  <!-- Node halos -->
  <circle cx="165" cy="55"  r="16" fill="#ff446622" stroke="#ff4466" stroke-width="1" filter="url(#glow)"/>
  <circle cx="135" cy="145" r="16" fill="#4a4aff22" stroke="#6699ff" stroke-width="1" filter="url(#glow)"/>
  <circle cx="165" cy="265" r="16" fill="#4a4aff22" stroke="#6699ff" stroke-width="1" filter="url(#glow)"/>

  <!-- Piece symbols -->
  <!-- bK on e8 -->
  <text x="165" y="60" text-anchor="middle" font-size="22" fill="#cc3355" filter="url(#glow)">♚</text>
  <!-- wQ on d5 -->
  <text x="135" y="150" text-anchor="middle" font-size="22" fill="#eeeeff" filter="url(#glow)">♛</text>
  <!-- wK on e1 -->
  <text x="165" y="270" text-anchor="middle" font-size="22" fill="#eeeeff" filter="url(#glow)">♔</text>

  <!-- Edge legend (bottom-left) -->
  <g font-size="9" fill="#aaaacc">
    <line x1="32" y1="308" x2="52" y2="308" stroke="#ff4466" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="55" y="311">Attack</text>
    <line x1="95" y1="308" x2="115" y2="308" stroke="#44ff88" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="118" y="311">Defense</text>
    <line x1="165" y1="308" x2="185" y2="308" stroke="#ffcc00" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="188" y="311">X-Ray</text>
    <line x1="225" y1="308" x2="245" y2="308" stroke="#6699ff" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="248" y="311">Proximity</text>
  </g>

  <!-- Panel label -->
  <text x="150" y="22" text-anchor="middle" font-size="11" fill="#8888bb" letter-spacing="2">BOARD GRAPH</text>

  <!-- ═══════════════════════════════════════════════
       ARROW: Board → GNN
  ════════════════════════════════════════════════ -->
  <line x1="285" y1="160" x2="370" y2="160" stroke="#6699ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="327" y="152" text-anchor="middle" font-size="9" fill="#6699ff" letter-spacing="1">encode</text>

  <!-- ═══════════════════════════════════════════════
       CENTER PANEL: GNN Block
  ════════════════════════════════════════════════ -->
  <rect x="375" y="80" width="150" height="160" rx="10" fill="url(#gnnGrad)" opacity="0.15" stroke="#6644cc" stroke-width="1.5"/>

  <!-- GNN layers (node circles) -->
  <g filter="url(#glow)">
    <!-- Input layer -->
    <circle cx="400" cy="110" r="5" fill="#6699ff"/><circle cx="400" cy="130" r="5" fill="#6699ff"/>
    <circle cx="400" cy="150" r="5" fill="#6699ff"/><circle cx="400" cy="170" r="5" fill="#6699ff"/>
    <circle cx="400" cy="190" r="5" fill="#6699ff"/><circle cx="400" cy="210" r="5" fill="#6699ff"/>
    <!-- Hidden layer 1 -->
    <circle cx="450" cy="120" r="5" fill="#9966ff"/><circle cx="450" cy="145" r="5" fill="#9966ff"/>
    <circle cx="450" cy="170" r="5" fill="#9966ff"/><circle cx="450" cy="195" r="5" fill="#9966ff"/>
    <!-- Hidden layer 2 -->
    <circle cx="495" cy="130" r="5" fill="#cc66ff"/><circle cx="495" cy="160" r="5" fill="#cc66ff"/>
    <circle cx="495" cy="190" r="5" fill="#cc66ff"/>
  </g>

  <!-- Connections input→h1 -->
  <g stroke="#6699ff" stroke-width="0.5" opacity="0.3">
    <line x1="405" y1="110" x2="445" y2="120"/><line x1="405" y1="130" x2="445" y2="120"/>
    <line x1="405" y1="150" x2="445" y2="145"/><line x1="405" y1="170" x2="445" y2="145"/>
    <line x1="405" y1="150" x2="445" y2="170"/><line x1="405" y1="170" x2="445" y2="170"/>
    <line x1="405" y1="190" x2="445" y2="195"/><line x1="405" y1="210" x2="445" y2="195"/>
  </g>
  <!-- Connections h1→h2 -->
  <g stroke="#9966ff" stroke-width="0.5" opacity="0.3">
    <line x1="455" y1="120" x2="490" y2="130"/><line x1="455" y1="145" x2="490" y2="130"/>
    <line x1="455" y1="145" x2="490" y2="160"/><line x1="455" y1="170" x2="490" y2="160"/>
    <line x1="455" y1="170" x2="490" y2="190"/><line x1="455" y1="195" x2="490" y2="190"/>
  </g>

  <!-- GNN label -->
  <text x="450" y="68" text-anchor="middle" font-size="13" fill="#aaaaff" font-weight="bold" letter-spacing="2">V8 GNN</text>
  <text x="450" y="84" text-anchor="middle" font-size="9" fill="#7777aa" letter-spacing="1">RGNN · Attention Pooling</text>

  <!-- Attention pooling indicator -->
  <ellipse cx="450" cy="240" rx="40" ry="10" fill="none" stroke="#cc66ff" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>
  <text x="450" y="244" text-anchor="middle" font-size="8" fill="#cc66ff">attn pool</text>
  <line x1="495" y1="160" x2="490" y2="233" stroke="#cc66ff" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- ═══════════════════════════════════════════════
       ARROW: GNN → Output
  ════════════════════════════════════════════════ -->
  <line x1="530" y1="160" x2="610" y2="160" stroke="#aaaacc" stroke-width="2" marker-end="url(#arrowWhite)"/>
  <text x="570" y="152" text-anchor="middle" font-size="9" fill="#aaaacc" letter-spacing="1">predict</text>

  <!-- ═══════════════════════════════════════════════
       RIGHT PANEL: Triple-Head Output
  ════════════════════════════════════════════════ -->
  <rect x="618" y="60" width="252" height="200" rx="10" fill="#0d0d22" stroke="#4a4a8a" stroke-width="1.5"/>
  <text x="744" y="82" text-anchor="middle" font-size="11" fill="#8888bb" letter-spacing="2">TRIPLE HEAD OUTPUT</text>

  <!-- WDL Head -->
  <rect x="634" y="92" width="220" height="48" rx="6" fill="#1a1a35" stroke="#6699ff" stroke-width="1"/>
  <text x="644" y="108" font-size="9" fill="#6699ff" letter-spacing="1">WDL</text>
  <!-- Bar chart: Loss / Draw / Win -->
  <rect x="644" y="112" width="18" height="20" rx="2" fill="#ff4466" opacity="0.85"/>
  <rect x="668" y="118" width="18" height="14" rx="2" fill="#ffcc00" opacity="0.85"/>
  <rect x="692" y="104" width="18" height="28" rx="2" fill="#44ff88" opacity="0.85"/>
  <text x="653" y="140" text-anchor="middle" font-size="7" fill="#ff4466">L</text>
  <text x="677" y="140" text-anchor="middle" font-size="7" fill="#ffcc00">D</text>
  <text x="701" y="140" text-anchor="middle" font-size="7" fill="#44ff88">W</text>
  <text x="800" y="122" text-anchor="end" font-size="18" fill="#44ff88" font-weight="bold" filter="url(#glow)">WIN</text>
  <text x="800" y="136" text-anchor="end" font-size="9" fill="#44ff88" opacity="0.7">p = 0.94</text>

  <!-- DTZ Head -->
  <rect x="634" y="148" width="220" height="40" rx="6" fill="#1a1a35" stroke="#9966ff" stroke-width="1"/>
  <text x="644" y="163" font-size="9" fill="#9966ff" letter-spacing="1">DTZ</text>
  <!-- Progress bar -->
  <rect x="644" y="167" width="140" height="10" rx="3" fill="#2a2a4a"/>
  <rect x="644" y="167" width="84"  height="10" rx="3" fill="#9966ff" opacity="0.85"/>
  <text x="800" y="174" text-anchor="end" font-size="16" fill="#cc99ff" font-weight="bold" filter="url(#glow)">DTZ 6</text>

  <!-- Eval Head -->
  <rect x="634" y="196" width="220" height="40" rx="6" fill="#1a1a35" stroke="#ffcc00" stroke-width="1"/>
  <text x="644" y="211" font-size="9" fill="#ffcc00" letter-spacing="1">EVAL (cp)</text>
  <!-- Gauge -->
  <rect x="644" y="215" width="140" height="10" rx="3" fill="#2a2a4a"/>
  <rect x="714" y="215" width="50"  height="10" rx="3" fill="#ffcc00" opacity="0.85"/>
  <text x="800" y="222" text-anchor="end" font-size="16" fill="#ffdd44" font-weight="bold" filter="url(#glow)">+320</text>

  <!-- Compression callout -->
  <rect x="634" y="244" width="220" height="10" rx="3" fill="none"/>
  <text x="744" y="253" text-anchor="middle" font-size="9" fill="#555577">956 MB  →  ~12 MB  ·  79.7× compression</text>

  <!-- Title top-center -->
  <text x="450" y="310" text-anchor="middle" font-size="10" fill="#444466" letter-spacing="3">NEURAL TABLEBASE COMPRESSION  ·  V8-PRO</text>
</svg>
